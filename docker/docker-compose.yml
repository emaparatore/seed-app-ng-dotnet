name: seed-app-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: seed-postgres-dev
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  seq:
    image: datalust/seq:latest
    container_name: seed-seq-dev
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq_data:/data

  mailpit:
    image: axllent/mailpit
    container_name: seed-mailpit-dev
    ports:
      - "8025:8025"
      - "1025:1025"

  api:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: seed-api-dev
    working_dir: /src
    env_file: .env
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - JwtSettings__Secret=${JwtSettings__Secret}
      - AllowedHosts=${AllowedHosts}
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
      - Smtp__Host=mailpit
      - Smtp__Port=1025
      - Smtp__Username=
      - Smtp__Password=
      - Smtp__FromEmail=noreply@seedapp.local
      - Smtp__FromName=Seed App Dev
      - Smtp__Security=None
    ports:
      - "5035:8080"
    volumes:
      - ../backend:/src
      - nuget_cache:/root/.nuget/packages
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
      mailpit:
        condition: service_started
    command:
      [
        "dotnet",
        "watch",
        "--project",
        "src/Seed.Api",
        "run",
        "--urls=http://0.0.0.0:8080"
      ]

  web:
    image: node:22
    container_name: seed-web-dev
    working_dir: /app
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - CHOKIDAR_BINARY_INTERVAL=1500
      - WATCHPACK_POLLING=true
    ports:
      - "4200:4200"
    volumes:
      - ../frontend/web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_started
    command: >
      sh -c "set -e;
      LOCK_HASH=$$(sha256sum package-lock.json | cut -d' ' -f1);
      if [ ! -f node_modules/.lock-hash ] || [ \"$$LOCK_HASH\" != \"$$(cat node_modules/.lock-hash)\" ]; then
        echo 'package-lock.json changed — running npm ci...';
        npm ci;
        echo $$LOCK_HASH > node_modules/.lock-hash;
      fi;
      npx ng build shared-auth --configuration development;
      npx ng build shared-core --configuration development;
      npx ng build shared-ui --configuration development;
      exec npx ng serve app --configuration docker"

  sandbox:
    build:
      context: ..
      dockerfile: docker/Dockerfile.sandbox
    container_name: seed-sandbox
    working_dir: /project
    stdin_open: true
    tty: true
    volumes:
      - ..:/project
      - ${USERPROFILE}/.claude:/home/claude/.claude
    environment:
      - ConnectionStrings__DefaultConnection=Host=seed-postgres-dev;Database=seeddb;Username=seed;Password=seed_password
      - DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER=true
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - sandbox

volumes:
  postgres_data:
  seq_data:
  nuget_cache:
  web_node_modules:
