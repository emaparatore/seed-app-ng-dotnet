name: ${COMPOSE_PROJECT_NAME:-seed-production}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 1536m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  seq:
    image: datalust/seq:latest
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=${SEQ_NOAUTH:-true}
    ports:
      - "127.0.0.1:${SEQ_PORT:-8081}:80"
    volumes:
      - seq_data:/data
    mem_limit: 512m
    networks:
      - app-network

  api:
    image: ghcr.io/${GHCR_OWNER}/seed-app-ng-dotnet/api:${API_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - JwtSettings__Secret=${JwtSettings__Secret}
      - AllowedHosts=${AllowedHosts}
      - Smtp__Host=${Smtp__Host:-}
      - Smtp__Port=${Smtp__Port:-587}
      - Smtp__Username=${Smtp__Username:-}
      - Smtp__Password=${Smtp__Password:-}
      - Smtp__FromEmail=${Smtp__FromEmail:-}
      - Smtp__FromName=${Smtp__FromName:-Seed App}
      - Smtp__Security=${Smtp__Security:-StartTls}
      - Client__BaseUrl=${CLIENT_BASE_URL}
      - Serilog__WriteTo__1__Name=Seq
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
      - Serilog__WriteTo__1__Args__apiKey=${SEQ_API_KEY:-}
    mem_limit: 768m
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  web:
    image: ghcr.io/${GHCR_OWNER}/seed-app-ng-dotnet/web:${WEB_IMAGE_TAG:-latest}
    restart: unless-stopped
    mem_limit: 384m
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - certbot_conf:/etc/letsencrypt:ro
    mem_limit: 64m
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres_data:
  seq_data:
  certbot_conf:

networks:
  app-network:
    driver: bridge
