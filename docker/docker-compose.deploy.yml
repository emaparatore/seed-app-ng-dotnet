name: ${COMPOSE_PROJECT_NAME:-seed-production}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 1536m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  seq:
    image: datalust/seq:latest
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=${SEQ_NOAUTH:-true}
    ports:
      - "127.0.0.1:${SEQ_PORT:-8081}:80"
    volumes:
      - seq_data:/data
    mem_limit: 512m
    networks:
      - app-network

  api:
    image: ghcr.io/${GHCR_OWNER}/seed-app-ng-dotnet/api:${API_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - JwtSettings__Secret=${JwtSettings__Secret}
      - AllowedHosts=${AllowedHosts}
      - Smtp__Host=${Smtp__Host:-}
      - Smtp__Port=${Smtp__Port:-587}
      - Smtp__Username=${Smtp__Username:-}
      - Smtp__Password=${Smtp__Password:-}
      - Smtp__FromEmail=${Smtp__FromEmail:-}
      - Smtp__FromName=${Smtp__FromName:-Seed App}
      - Smtp__Security=${Smtp__Security:-StartTls}
      - Client__BaseUrl=${CLIENT_BASE_URL}
      - Serilog__WriteTo__1__Name=Seq
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
      - Serilog__WriteTo__1__Args__apiKey=${SEQ_API_KEY:-}
    mem_limit: 768m
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  web:
    image: ghcr.io/${GHCR_OWNER}/seed-app-ng-dotnet/web:${WEB_IMAGE_TAG:-latest}
    restart: unless-stopped
    mem_limit: 384m
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - certbot_conf:/etc/letsencrypt:ro
    mem_limit: 64m
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    mem_limit: 384m
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    mem_limit: 192m
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - app-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    mem_limit: 128m
    networks:
      - app-network

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    mem_limit: 64m
    networks:
      - app-network

volumes:
  postgres_data:
  seq_data:
  certbot_conf:
  prometheus_data:
  grafana_data:

networks:
  app-network:
    driver: bridge
