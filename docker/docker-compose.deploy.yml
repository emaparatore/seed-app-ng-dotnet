name: seed-app-deploy

services:
  postgres:
    image: postgres:16-alpine
    container_name: seed-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  seq:
    image: datalust/seq:latest
    container_name: seed-seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - seq_data:/data
    networks:
      - app-network

  api:
    image: ghcr.io/${GHCR_OWNER}/seed-app-ng-dotnet/api:${IMAGE_TAG:-latest}
    container_name: seed-api
    env_file: .env
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - JwtSettings__Secret=${JwtSettings__Secret}
      - AllowedHosts=${AllowedHosts}
      - Serilog__WriteTo__1__Name=Seq
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  web:
    image: ghcr.io/${GHCR_OWNER}/seed-app-ng-dotnet/web:${IMAGE_TAG:-latest}
    container_name: seed-web
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: seed-nginx
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: seed-certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'
    networks:
      - app-network

volumes:
  postgres_data:
  seq_data:
  certbot_conf:
  certbot_www:

networks:
  app-network:
    driver: bridge
