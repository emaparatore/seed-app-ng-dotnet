<div class="admin-container">
  <nav class="admin-sidebar">
    <mat-nav-list>
      <a mat-list-item routerLink="dashboard" routerLinkActive="active" *hasPermission="permissions.Dashboard.ViewStats">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="users" routerLinkActive="active" *hasPermission="permissions.Users.Read">
        <mat-icon matListItemIcon>people</mat-icon>
        <span matListItemTitle>Utenti</span>
      </a>
      <a mat-list-item routerLink="roles" routerLinkActive="active" *hasPermission="permissions.Roles.Read">
        <mat-icon matListItemIcon>admin_panel_settings</mat-icon>
        <span matListItemTitle>Ruoli</span>
      </a>
      <a mat-list-item routerLink="audit-log" routerLinkActive="active" *hasPermission="permissions.AuditLog.Read">
        <mat-icon matListItemIcon>history</mat-icon>
        <span matListItemTitle>Audit Log</span>
      </a>
      <a mat-list-item routerLink="settings" routerLinkActive="active" *hasPermission="permissions.Settings.Read">
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>Impostazioni</span>
      </a>
      <a mat-list-item routerLink="system-health" routerLinkActive="active" *hasPermission="permissions.SystemHealth.Read">
        <mat-icon matListItemIcon>monitor_heart</mat-icon>
        <span matListItemTitle>Stato Sistema</span>
      </a>
    </mat-nav-list>
  </nav>
  <main class="admin-content">
    <router-outlet />
  </main>
</div>
