<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Abbonamento attivato!</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="status-content">
        <mat-icon class="success-icon">check_circle</mat-icon>
        <p>Il tuo abbonamento è stato attivato con successo.</p>
      </div>
    </mat-card-content>
    <mat-card-actions align="end">
      <a mat-button routerLink="/">Torna alla home</a>
      <a mat-flat-button color="primary" routerLink="/">Vai alla gestione abbonamento</a>
    </mat-card-actions>
  </mat-card>
</div>
