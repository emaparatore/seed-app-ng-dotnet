<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Checkout annullato</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="status-content">
        <mat-icon class="info-icon">info</mat-icon>
        <p>Hai annullato il processo di pagamento. Nessun addebito è stato effettuato.</p>
      </div>
    </mat-card-content>
    <mat-card-actions align="end">
      <a mat-button routerLink="/">Torna alla home</a>
      <a mat-flat-button color="primary" routerLink="/pricing">Torna ai piani</a>
    </mat-card-actions>
  </mat-card>
</div>
