<mat-toolbar color="primary" class="top-nav">
  <span class="brand" routerLink="/">
    <img src="/logo.svg" alt="Seed App" class="nav-logo" />
    Seed App
  </span>
  <span class="spacer"></span>

  @if (authService.isAuthenticated()) {
    <a class="user-name-link" routerLink="/profile">
      {{ authService.currentUser()?.firstName }} {{ authService.currentUser()?.lastName }}
    </a>
    <button mat-button type="button" (click)="authService.logout()">Logout</button>
  } @else {
    <button mat-button type="button" routerLink="/login">Login</button>
    <button mat-button type="button" routerLink="/register">Register</button>
  }
</mat-toolbar>

<router-outlet />
