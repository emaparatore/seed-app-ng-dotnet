name: Semgrep SAST

on:
  pull_request:
    branches: [dev, master]
  push:
    branches: [master, dev]

concurrency:
  group: semgrep-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6

      - name: Run Semgrep
        run: |
          semgrep_exit_code=0

          semgrep scan \
            --config auto \
            --error \
            --severity ERROR \
            --severity WARNING \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude "bin" \
            --exclude "obj" \
            --sarif \
            --output semgrep-results.sarif \
            . || semgrep_exit_code=$?

          python - <<'PY'
          import json
          from pathlib import Path

          sarif_path = Path("semgrep-results.sarif")
          if not sarif_path.exists():
              print("Semgrep did not produce semgrep-results.sarif.")
              raise SystemExit(0)

          sarif = json.loads(sarif_path.read_text(encoding="utf-8"))
          runs = sarif.get("runs", [])
          results = runs[0].get("results", []) if runs else []

          if not results:
              print("Semgrep found no blocking findings.")
              raise SystemExit(0)

          print(f"Semgrep blocking findings: {len(results)}")
          for index, result in enumerate(results[:10], start=1):
              rule_id = result.get("ruleId", "unknown-rule")
              message = result.get("message", {}).get("text", "No message provided.")
              location = result.get("locations", [{}])[0].get("physicalLocation", {})
              artifact = location.get("artifactLocation", {}).get("uri", "unknown-file")
              region = location.get("region", {})
              line = region.get("startLine", "?")
              print(f"{index}. {artifact}:{line} [{rule_id}]")
              print(f"   {message}")
          PY

          if [ "$semgrep_exit_code" -ne 0 ]; then
            echo "::error::Semgrep found blocking issues. Review the summary printed above and the uploaded SARIF results."
          fi

          exit "$semgrep_exit_code"

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
        continue-on-error: true
