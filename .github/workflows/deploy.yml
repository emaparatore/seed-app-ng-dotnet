      #   run: |
      #     TAG=${{ needs.determine-environment.outputs.image_tag }}
      #     kubectl set image deployment/seed-api api=ghcr.io/${{ github.repository }}/api:${TAG}
      #     kubectl set image deployment/seed-web web=ghcr.io/${{ github.repository }}/web:${TAG}
