name: Deploy

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
    branches: [master, dev]
    # NOTE: `workflow_run` executes the workflow definition from the repository
    # default branch. Keep that branch aligned with deploy fixes, otherwise runs
    # triggered from `dev` can still execute an older deploy.yml.

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  determine-environment:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.name }}
      image_tag: ${{ steps.env.outputs.tag }}
    steps:
      - name: Determine target environment
        id: env
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          if [ "$BRANCH" = "master" ]; then
            echo "name=production" >> "$GITHUB_OUTPUT"
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          elif [ "$BRANCH" = "dev" ]; then
            echo "name=staging" >> "$GITHUB_OUTPUT"
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: determine-environment
    if: needs.determine-environment.outputs.environment != ''
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-environment.outputs.environment }}
    # Configure in repo Settings > Environments:
    #   - "staging":  no approval required (auto-deploy)
    #   - "production": required reviewers + wait timer

    steps:
      - uses: actions/checkout@v4

      - name: Check which images were built
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          JOBS=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs)
          API_RESULT=$(echo "$JOBS" | jq -r '[.jobs[] | select(.name == "build-api") | .conclusion] | first // "skipped"')
          WEB_RESULT=$(echo "$JOBS" | jq -r '[.jobs[] | select(.name == "build-web") | .conclusion] | first // "skipped"')

          echo "api=$API_RESULT" >> "$GITHUB_OUTPUT"
          echo "web=$WEB_RESULT" >> "$GITHUB_OUTPUT"

          SERVICES=""
          if [ "$API_RESULT" = "success" ]; then SERVICES="api"; fi
          if [ "$WEB_RESULT" = "success" ]; then SERVICES="$SERVICES web"; fi
          SERVICES=$(echo "$SERVICES" | xargs)
          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"

          if [ -z "$SERVICES" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "No images were built - skipping deploy."
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Deploying services: $SERVICES"
          fi

      - name: Deploy info
        if: steps.check.outputs.should_deploy == 'true'
        run: |
          echo "Deploying to: ${{ needs.determine-environment.outputs.environment }}"
          echo "Image tag:    ${{ needs.determine-environment.outputs.image_tag }}"
          echo "Services:     ${{ steps.check.outputs.services }}"

      # ============================================================
      # OPTION A: Docker Compose on VPS via SSH (ACTIVE)
      # ============================================================
      # Required secrets (configure in repo Settings > Secrets):
      #   DEPLOY_HOST    - VPS IP or hostname
      #   DEPLOY_USER    - SSH user (e.g. "deploy")
      #   DEPLOY_SSH_KEY - Private SSH key
      #   GHCR_TOKEN     - GitHub PAT with read:packages scope

      - name: Sync deploy files to VPS
        if: steps.check.outputs.should_deploy == 'true'
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "mkdir -p /opt/seed-app/docker /opt/seed-app/scripts /opt/seed-app/backups"

          echo "Syncing docker-compose.deploy.yml..."
          scp -o StrictHostKeyChecking=no -i /tmp/deploy_key docker/docker-compose.deploy.yml ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/seed-app/docker/docker-compose.deploy.yml

          echo "Syncing deploy scripts..."
          scp -o StrictHostKeyChecking=no -i /tmp/deploy_key docker/scripts/migrate.sh docker/scripts/seed.sh docker/scripts/restore.sh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/seed-app/scripts/

          echo "Verifying files exist on VPS..."
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "chmod 755 /opt/seed-app/scripts/*.sh && test -f /opt/seed-app/docker/docker-compose.deploy.yml && test -f /opt/seed-app/scripts/migrate.sh && test -f /opt/seed-app/scripts/seed.sh && test -f /opt/seed-app/scripts/restore.sh && echo 'OK: deploy files synced'" \
            || { echo 'ERROR: deploy files missing after copy'; exit 1; }
          rm -f /tmp/deploy_key

      - name: Deploy via SSH
        if: steps.check.outputs.should_deploy == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -eu

            if [ -f /opt/seed-app/docker-compose.deploy.yml ]; then
              DEPLOY_DIR=/opt/seed-app
              COMPOSE_FILE=/opt/seed-app/docker-compose.deploy.yml
            elif [ -f /opt/seed-app/docker/docker-compose.deploy.yml ]; then
              DEPLOY_DIR=/opt/seed-app/docker
              COMPOSE_FILE=/opt/seed-app/docker/docker-compose.deploy.yml
            else
              echo "docker-compose.deploy.yml not found in /opt/seed-app or /opt/seed-app/docker"
              exit 1
            fi

            SCRIPT_DIR=/opt/seed-app/scripts

            if [ ! -f "$SCRIPT_DIR/migrate.sh" ]; then
              echo "Migration script not found at $SCRIPT_DIR/migrate.sh"
              exit 1
            fi

            if [ ! -f "$SCRIPT_DIR/seed.sh" ]; then
              echo "Seed script not found at $SCRIPT_DIR/seed.sh"
              exit 1
            fi

            if [ ! -f "$SCRIPT_DIR/restore.sh" ]; then
              echo "Restore script not found at $SCRIPT_DIR/restore.sh"
              exit 1
            fi

            echo "Deploy directory: $DEPLOY_DIR"
            echo "Compose file: $COMPOSE_FILE"
            echo "Available deploy scripts:"
            ls -l "$SCRIPT_DIR"

            cd "$DEPLOY_DIR"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            sed -i 's/^IMAGE_TAG=.*/IMAGE_TAG=${{ needs.determine-environment.outputs.image_tag }}/' .env

            echo "Pulling API image for migrations and seeding..."
            docker compose -f "$COMPOSE_FILE" pull api

            echo "Running database migrations..."
            if COMPOSE_FILE="$COMPOSE_FILE" bash "$SCRIPT_DIR/migrate.sh"; then
              echo "Migrations complete."
            else
              MIGRATE_EXIT=$?
              echo "ERROR: Database migrations failed with exit code $MIGRATE_EXIT."
              exit "$MIGRATE_EXIT"
            fi

            echo "Running application seeding..."
            if COMPOSE_FILE="$COMPOSE_FILE" bash "$SCRIPT_DIR/seed.sh"; then
              echo "Application seeding complete."
            else
              SEED_EXIT=$?
              echo "ERROR: Application seeding failed with exit code $SEED_EXIT."
              exit "$SEED_EXIT"
            fi

            if [ "${{ steps.check.outputs.api }}" = "success" ]; then
              docker compose -f "$COMPOSE_FILE" up -d --no-deps api

              echo "Waiting for API health check..."
              for i in $(seq 1 30); do
                if docker compose -f "$COMPOSE_FILE" exec -T api curl -sf http://localhost:8080/health/ready > /dev/null 2>&1; then
                  echo "API is healthy."
                  break
                fi
                if [ "$i" -eq 30 ]; then
                  echo "ERROR: API health check failed after 30 attempts."
                  exit 1
                fi
                sleep 2
              done
            fi

            if [ "${{ steps.check.outputs.web }}" = "success" ]; then
              docker compose -f "$COMPOSE_FILE" pull web
              docker compose -f "$COMPOSE_FILE" up -d --no-deps web
            fi

            docker image prune -f

      # ============================================================
      # OPTION B: Azure Container Apps
      # ============================================================
      # - name: Azure Login
      #   uses: azure/login@v2
      #   with:
      #     creds: ${{ secrets.AZURE_CREDENTIALS }}
