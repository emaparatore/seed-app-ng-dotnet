name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      force_api:
        description: "Force API image rebuild"
        required: false
        type: boolean
        default: false
      force_web:
        description: "Force Web image rebuild"
        required: false
        type: boolean
        default: false
  push:
    branches: [master, dev]

concurrency:
  group: docker-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/web/**'

  build-api:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || inputs.force_api == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'master' }}
            type=sha,prefix=sha-,enable=${{ github.ref_name == 'master' }}
            type=semver,pattern={{version}},enable=${{ github.ref_name == 'master' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.ref_name == 'master' }}
            type=raw,value=dev,enable=${{ github.ref_name == 'dev' }}
            type=sha,prefix=dev-sha-,enable=${{ github.ref_name == 'dev' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/src/Seed.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan API image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/api:${{ steps.meta.outputs.version }}
          exit-code: 1
          severity: CRITICAL,HIGH

  build-web:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || inputs.force_web == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/web
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'master' }}
            type=sha,prefix=sha-,enable=${{ github.ref_name == 'master' }}
            type=semver,pattern={{version}},enable=${{ github.ref_name == 'master' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.ref_name == 'master' }}
            type=raw,value=dev,enable=${{ github.ref_name == 'dev' }}
            type=sha,prefix=dev-sha-,enable=${{ github.ref_name == 'dev' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: frontend/web
          file: frontend/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Web image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/web:${{ steps.meta.outputs.version }}
          exit-code: 1
          severity: CRITICAL,HIGH
