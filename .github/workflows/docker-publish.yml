name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      force_api:
        description: "Force API image rebuild"
        required: false
        type: boolean
        default: false
      force_web:
        description: "Force Web image rebuild"
        required: false
        type: boolean
        default: false
  push:
    branches: [master, dev]

concurrency:
  group: docker-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  PROJECT_SLUG: ${{ vars.PROJECT_SLUG || 'seed-app' }}
  GHCR_IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/${{ vars.PROJECT_SLUG || 'seed-app' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/web/**'

  build-api:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || inputs.force_api == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.GHCR_IMAGE_BASE }}/api
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'master' }}
            type=sha,prefix=sha-,enable=${{ github.ref_name == 'master' }}
            type=semver,pattern={{version}},enable=${{ github.ref_name == 'master' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.ref_name == 'master' }}
            type=raw,value=dev,enable=${{ github.ref_name == 'dev' }}
            type=sha,prefix=dev-sha-,enable=${{ github.ref_name == 'dev' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push API image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: backend
          file: backend/src/Seed.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan API image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.GHCR_IMAGE_BASE }}/api:${{ steps.meta.outputs.version }}
          exit-code: 1
          severity: CRITICAL,HIGH

  build-web:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || inputs.force_web == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.GHCR_IMAGE_BASE }}/web
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'master' }}
            type=sha,prefix=sha-,enable=${{ github.ref_name == 'master' }}
            type=semver,pattern={{version}},enable=${{ github.ref_name == 'master' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.ref_name == 'master' }}
            type=raw,value=dev,enable=${{ github.ref_name == 'dev' }}
            type=sha,prefix=dev-sha-,enable=${{ github.ref_name == 'dev' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push Web image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: frontend/web
          file: frontend/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Web image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.GHCR_IMAGE_BASE }}/web:${{ steps.meta.outputs.version }}
          exit-code: 1
          severity: CRITICAL,HIGH
