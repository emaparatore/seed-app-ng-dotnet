name: CI

on:
  pull_request:
    branches: [dev, master]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/web/**'

  backend-build-test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj', 'backend/Seed.slnx') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        working-directory: backend
        run: dotnet restore Seed.slnx

      - name: Build
        working-directory: backend
        run: dotnet build Seed.slnx --no-restore -c Release

      - name: Unit Tests
        working-directory: backend
        run: dotnet test tests/Seed.UnitTests --no-build -c Release --logger "trx;LogFileName=unit-results.trx"

      - name: Integration Tests
        working-directory: backend
        run: dotnet test tests/Seed.IntegrationTests --no-build -c Release --logger "trx;LogFileName=integration-results.trx"

      - name: Verify no pending model changes
        working-directory: backend
        env:
          ASPNETCORE_ENVIRONMENT: Development
        run: |
          dotnet tool install --global dotnet-ef --version 10.0.*
          set +e
          ef_output=$(dotnet ef migrations has-pending-model-changes \
            --project src/Seed.Infrastructure \
            --startup-project src/Seed.Api \
            --configuration Release \
            --no-build 2>&1)
          ef_exit_code=$?
          set -e

          echo "$ef_output"

          if [ $ef_exit_code -eq 0 ]; then
            echo "No pending model changes"
          elif echo "$ef_output" | grep -qi "changes have been made to the model"; then
            echo "ERROR: Model changes detected without a migration. Run 'dotnet ef migrations add <Name>'"
            exit 1
          else
            echo "ERROR: dotnet ef check failed for a reason unrelated to pending model changes."
            echo "Run 'dotnet ef migrations has-pending-model-changes --verbose' to investigate."
            exit 1
          fi

      - name: Build migration bundle
        working-directory: backend
        env:
          ASPNETCORE_ENVIRONMENT: Development
        run: |
          dotnet ef migrations bundle \
            --project src/Seed.Infrastructure \
            --startup-project src/Seed.Api \
            -o /tmp/efbundle-test \
            --force
          echo "Migration bundle built successfully"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/tests/**/TestResults/*.trx

  frontend-build-test:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install dependencies
        working-directory: frontend/web
        run: npm ci

      - name: Build shared libraries
        working-directory: frontend/web
        run: |
          npx ng build shared-auth
          npx ng build shared-core
          npx ng build shared-ui

      - name: Run tests
        working-directory: frontend/web
        run: npx ng test --watch=false

      - name: Build app
        working-directory: frontend/web
        run: npm run build

  ci-success:
    if: always()
    needs: [changes, backend-build-test, frontend-build-test]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.backend-build-test.result }}" == "failure" || \
                "${{ needs.frontend-build-test.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed or were skipped"
